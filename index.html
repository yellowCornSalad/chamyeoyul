<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>참여율 관리</title>
<style>
  :root{
    --bg:#f3f4f7; --panel:#fff; --sidebar:#fff; --line:#ecedf1; --line2:#f2f3f6;
    --ink:#1a1d23; --ink2:#3f4650; --sub:#8a919e; --muted:#aab0bb;
    --accent:#6366f1; --accent-d:#4f46e5; --accent-soft:#eef0fe;
    --red:#dc2626; --red-soft:#fee2e2; --amber:#d97706; --amber-soft:#fef3c7;
    --green:#16a34a; --green-soft:#dcfce7;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 10px 26px rgba(16,24,40,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Malgun Gothic",-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased}
  button{font-family:inherit}

  /* ===== gate ===== */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gatecard{width:100%;max-width:360px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px 26px;box-shadow:var(--shadow)}
  .gatecard .brandrow{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .gatecard h1{font-size:17px;margin:0}
  .gatecard .gsub{color:var(--sub);font-size:12.5px;margin:0 0 16px}
  .gaterow{display:flex;gap:8px}
  #pw{flex:1;padding:11px 13px;font-size:15px;border:1.5px solid var(--line);border-radius:11px;outline:none}
  #pw:focus{border-color:var(--accent)}
  #go{padding:0 18px;font-size:14px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:11px;cursor:pointer}
  #go:hover{background:var(--accent-d)}
  .pwerr{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}

  /* ===== app shell ===== */
  #app{display:flex;align-items:stretch;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;flex:0 0 236px;width:236px;background:var(--sidebar);
    border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:6px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .name{font-weight:800;font-size:15px;letter-spacing:-.2px}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:.4px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .navitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:transparent;
    color:var(--ink2);font-size:13.5px;font-weight:600;padding:10px 10px;border-radius:10px;cursor:pointer}
  .navitem:hover{background:#f6f7f9}
  .navitem.active{background:var(--accent-soft);color:var(--accent-d)}
  .navitem svg{width:18px;height:18px;flex:0 0 18px}
  .sidefoot{margin-top:auto}
  .synccard{border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fbfbfd}
  .synccard .r1{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink2)}
  .synccard .r2{color:var(--muted);font-size:11px;margin-top:3px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
  .dot.pulse{box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:pulse 2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 6px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

  .main{flex:1;min-width:0;padding:26px 30px 60px}
  .pagehead h1{font-size:22px;margin:0 0 3px;letter-spacing:-.3px;cursor:pointer;display:inline-block}
  .pagehead h1:hover{color:var(--accent-d)}
  .pagehead .sub{color:var(--sub);font-size:13px;margin:0 0 18px}

  /* ===== project cards ===== */
  .cardscroll{display:flex;gap:14px;overflow-x:auto;padding:2px 2px 12px;scroll-snap-type:x proximity}
  .cardscroll::-webkit-scrollbar{height:8px}
  .cardscroll::-webkit-scrollbar-thumb{background:#e2e4ea;border-radius:8px}
  .pcard{flex:0 0 236px;scroll-snap-align:start;background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:15px 17px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s, box-shadow .12s, border-color .12s}
  .pcard:hover{transform:translateY(-2px)}
  .pcard.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),var(--shadow)}
  .pcard.total{background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff}
  .pcard.total .pcard-label,.pcard.total .pcard-foot{color:rgba(255,255,255,.72)}
  .pcard.total .pcard-badge{background:rgba(255,255,255,.18);color:#fff}
  .pcard.total.active{box-shadow:0 0 0 3px rgba(124,58,237,.28),var(--shadow)}
  .pcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .pcard-name{font-weight:700;font-size:14px;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
  .pcard-badge{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);background:#f2f3f6;border-radius:20px;padding:2px 8px}
  .pcard-label{font-size:10.5px;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
  .pcard-big{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .pcard-big .unit{font-size:13px;font-weight:600;margin-left:2px;color:var(--sub)}
  .pcard.total .pcard-big .unit{color:rgba(255,255,255,.7)}
  .pcard-foot{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line2);
    font-size:11.5px;color:var(--sub)}
  .pcard.total .pcard-foot{border-top-color:rgba(255,255,255,.18)}
  .pcard-foot .fx{display:inline-flex;align-items:center;gap:5px}
  .pd{width:7px;height:7px;border-radius:50%;display:inline-block}
  .pd.red{background:var(--red)} .pd.amber{background:var(--amber)} .pd.green{background:var(--green)}
  .hint{color:var(--muted);font-size:11.5px;margin:2px 2px 18px}

  /* ===== panel ===== */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:6px 6px 8px}
  .panelhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;padding:16px 16px 12px;flex-wrap:wrap}
  .panelhead h2{font-size:16px;margin:0}
  .panelsub{color:var(--sub);font-size:12px;margin-top:3px}
  .searchwrap{position:relative}
  #q{width:230px;max-width:52vw;padding:9px 34px 9px 13px;font-size:13.5px;border:1.5px solid var(--line);border-radius:11px;outline:none;background:#fff}
  #q:focus{border-color:var(--accent)}
  .qclear{position:absolute;right:7px;top:50%;transform:translateY(-50%);border:none;background:#eef0f3;color:var(--sub);
    border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
  .qclear:hover{background:#e2e4e9}
  .pills{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 12px}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink2);
    font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer}
  .pill:hover{background:#f7f8fa}
  .pill.active{background:#1f2430;color:#fff;border-color:#1f2430}
  .pill .cnt{font-size:11px;background:rgba(0,0,0,.08);border-radius:20px;padding:1px 7px;font-weight:700}
  .pill.active .cnt{background:rgba(255,255,255,.22)}

  /* ===== list table ===== */
  .ptable{width:100%;border-collapse:collapse;font-size:13.5px}
  .ptable th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.3px;text-transform:uppercase;
    padding:9px 16px;border-bottom:1px solid var(--line)}
  .ptable th.r{text-align:right}
  .ptable td{padding:12px 16px;border-bottom:1px solid var(--line2);vertical-align:middle}
  .ptable td:first-child{white-space:nowrap}
  .ptable td:nth-child(2){max-width:280px}
  .ptable tr[data-n]{cursor:pointer}
  .ptable tr[data-n]:hover td{background:#f8f9fc}
  .ptable td.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ptable td.over{color:var(--red);font-weight:700}
  .ptable td.full{color:var(--amber);font-weight:700}
  .barcol{width:120px}
  .bar{height:6px;border-radius:5px;background:#eef0f3;overflow:hidden;min-width:64px}
  .bar>span{display:block;height:100%;border-radius:5px}
  .pjnames{color:var(--sub);font-size:11.5px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
  .badge.red{color:var(--red);background:var(--red-soft)} .badge.amber{color:var(--amber);background:var(--amber-soft)}
  .badge.green{color:var(--green);background:var(--green-soft)}
  .empty{color:var(--sub);padding:28px 16px;text-align:center}

  /* ===== back bar ===== */
  .backbar{padding:12px 16px 4px}
  .backbtn{border:none;background:transparent;color:var(--accent-d);font-size:13px;font-weight:700;cursor:pointer;padding:4px 2px}
  .backbtn:hover{text-decoration:underline}

  /* ===== detail / edit card ===== */
  .card{background:#fff;border-top:1px solid var(--line2);padding:6px 18px 18px}
  .card h2{font-size:18px;margin:6px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--accent-soft);color:var(--accent-d)}
  .tag.new{background:var(--green-soft);color:#047857}
  .tag.lead{background:var(--amber-soft);color:#92400e}
  .editbtn{margin-left:auto;font-size:12.5px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:9px;padding:8px 15px;cursor:pointer}
  .editbtn:hover{background:var(--accent-d)}
  .editnote{color:var(--sub);font-size:12px;margin:0 0 12px}
  .yrhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:8px 0 10px}
  .yrhead .sum{font-size:14px;font-weight:600}
  .yrhead .rem{color:var(--sub);font-size:12.5px}
  .over{color:var(--red);font-weight:700}
  .full{color:var(--amber);font-weight:700}
  table.pj{width:100%;border-collapse:collapse;margin:2px 0 12px;font-size:13px}
  table.pj td{padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
  table.pj td.p{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:600}
  table.pj .rl{color:var(--sub);font-size:11.5px}
  table.pj .nt{color:var(--red);font-size:11.5px}
  .strip{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin:2px 0 4px}
  .cell{border-radius:7px;padding:6px 2px 5px;text-align:center;font-size:11px}
  .cell .m{color:var(--sub);font-size:9.5px;display:block;margin-bottom:1px}
  .cell .v{font-variant-numeric:tabular-nums;font-weight:700}
  .legend{color:var(--muted);font-size:11px;margin-top:4px}
  .ejrow{border-bottom:1px solid var(--line2);padding:10px 0}
  .ejrow:last-of-type{border-bottom:none}
  .ejhead{font-size:13px;font-weight:700;margin-bottom:6px}
  .ejhead .rl{font-weight:400;color:var(--sub);font-size:11.5px}
  .ejhead .nt{color:var(--red);font-weight:400;font-size:11.5px}
  .segrow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:5px 0}
  .rateinp{width:66px;padding:6px 8px;font-size:13px;border:1.5px solid var(--line);border-radius:8px;text-align:right;font-variant-numeric:tabular-nums}
  .rateinp:focus{outline:none;border-color:var(--accent)}
  .moninp{padding:5px 6px;font-size:13px;border:1.5px solid var(--line);border-radius:8px;background:#fff}
  .segunit{color:var(--sub);font-size:12px}
  .segdel{border:none;background:var(--red-soft);color:#b91c1c;border-radius:7px;width:26px;height:26px;cursor:pointer;font-size:15px;line-height:1;margin-left:2px}
  .segadd{border:1px dashed var(--line);background:#fff;color:var(--sub);border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;margin-top:4px}
  .editactions{display:flex;align-items:center;gap:8px;margin-top:12px}
  .savebtn{font-size:13px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:9px;padding:9px 20px;cursor:pointer}
  .savebtn:hover{background:var(--accent-d)}
  .cancelbtn{font-size:13px;color:var(--ink2);background:#f1f2f5;border:none;border-radius:9px;padding:9px 15px;cursor:pointer}
  .savemsg{color:var(--sub);font-size:12px}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;
    font-size:13px;padding:11px 17px;border-radius:12px;opacity:0;pointer-events:none;transition:all .25s;z-index:60;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:820px){
    #app{flex-direction:column}
    .sidebar{position:static;height:auto;width:auto;flex:none;flex-direction:row;align-items:center;gap:10px;padding:10px 14px;border-right:none;border-bottom:1px solid var(--line)}
    .brand{padding:0}
    .nav{flex-direction:row;margin-left:8px}
    .sidefoot{margin:0 0 0 auto}
    .synccard{padding:7px 10px}.synccard .r2{display:none}
    .main{padding:18px 16px 50px}
  }
</style>
</head>

  <div id="gate">
    <div class="gatecard">
      <div class="brandrow"><div class="mark">참</div><div><h1>참여율 관리</h1></div></div>
      <p class="gsub">열람하려면 비밀번호를 입력하세요.</p>
      <div class="gaterow">
        <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus>
        <button id="go">확인</button>
      </div>
      <div id="pwerr" class="pwerr"></div>
    </div>
  </div>

  <div id="app" style="display:none">
    <aside class="sidebar">
      <div class="brand"><div class="mark">참</div><div><div class="name">참여율 관리</div><div class="sub">ALLOCATION</div></div></div>

      </nav>
      <div class="sidefoot">
        <div class="synccard">
          <div class="r1"><span class="dot pulse"></span> 실시간 동기화 중</div>
          <div class="r2" id="syncsub">2026년 기준 · 11개 과제</div>

      </div>
    </aside>

    <main class="main">
      <div class="pagehead">

        <p class="sub">인원별 국가과제 참여율과 잔여 여력(추가 가능 %)을 확인합니다. 최대 100%.</p>
      </div>
      <div class="cardscroll" id="projCards"></div>
      <div class="hint">카드를 누르면 해당 과제 인원만 볼 수 있어요.</div>
      <section class="panel">
        <div class="panelhead">
          <div><h2>인원 목록</h2><div class="panelsub" id="listsub"></div></div>
          <div class="searchwrap"><input id="q" type="text" placeholder="이름 검색" autocomplete="off"><button id="qclear" class="qclear" title="지우기" style="display:none">×</button></div>
        </div>
        <div class="pills" id="pills"></div>
        <div id="out"></div>
      </section>
    </main>
  </div>

/* ===== 암호화 ===== */
function b64ToBytes(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
function bytesToB64(b){ let s=""; for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
async function deriveKey(password, salt){
  const bk = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:150000, hash:"SHA-256"}, bk, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function decryptBlob(o, password){
  const key = await deriveKey(password, b64ToBytes(o.salt));
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(o.iv)}, key, b64ToBytes(o.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
async function encryptProjects(projects, password){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ct = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(projects))));
  return { salt:bytesToB64(salt), iv:bytesToB64(iv), data:bytesToB64(ct) };
}

/* ===== Supabase ===== */
async function sbLatest(n){
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=id,created_at,blob&order=created_at.desc&limit=${n||5}`, {headers:SB_H});
  if(!r.ok) throw new Error("sb "+r.status);
  return r.json();
}
async function sbInsert(blobObj){
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, {method:"POST", headers:{...SB_H,"Content-Type":"application/json",Prefer:"return=representation"}, body:JSON.stringify({blob:JSON.stringify(blobObj)})});
  if(!r.ok) throw new Error("sb insert "+r.status);
  return (await r.json())[0];
}
async function loadData(password){
  let rows=null;
  try{ rows = await sbLatest(5); }catch(e){ rows=null; }
  if(rows){ for(const row of rows){ try{ const proj=await decryptBlob(JSON.parse(row.blob), password); return {projects:proj, versionId:row.id}; }catch(e){} } }
  const proj = await decryptBlob(ENC, password);
  return {projects:proj, versionId:null};
}

/* ===== 계산 ===== */
const r1 = x => Math.round(x*10)/10;
function strip(entries){ const m=Array(13).fill(0); for(const e of entries) for(const [p,f,t] of e.s) for(let i=f;i<=t;i++) m[i]+=p; return m; }
function peakOf(m){ let mx=0,mi=1; for(let i=1;i<=12;i++) if(m[i]>mx+1e-9){mx=m[i];mi=i;} return {mx:r1(mx),mi}; }
function segText(s){ return s.map(([p,f,t])=> f===1&&t===12 ? p+"%" : `${p}%(${f}~${t}월)`).join(" → "); }
function cellColor(v){
  if(v>100.0001) return {bg:"#fee2e2",fg:"#b91c1c"};
  if(v>=99.999)  return {bg:"#fde68a",fg:"#92400e"};
  if(v>=80)      return {bg:"#fef3c7",fg:"#92400e"};
  if(v>0)        return {bg:"#dcfce7",fg:"#166534"};
  return {bg:"#f3f4f6",fg:"#9ca3af"};
}

}

      let mx=0; for(let i=1;i<=12;i++) if(m[i]>mx) mx=m[i]; sum+=mx; }
    map[pj.name]={cnt, avg:cnt?Math.round(sum/cnt):0, nw}; }
  return map;
}
function renderProjectCards(){
  const st=projStats();
  let over=0,full=0; for(const n of NAMES){ const {mx}=peakOf(strip(INDEX[n])); if(mx>100.0001)over++; else if(mx>=99.999)full++; }
  let h=`<div class="pcard total ${!projectFilter?'active':''}" data-proj=""><div class="pcard-top"><span class="pcard-name">전체</span><span class="pcard-badge">ALL</span></div>`
    +`<div class="pcard-label">총 인원</div><div class="pcard-big">${NAMES.length}<span class="unit">명</span></div>`
    +`<div class="pcard-foot"><span class="fx"><i class="pd red"></i>초과 ${over}</span><span class="fx"><i class="pd amber"></i>100% ${full}</span></div></div>`;
  for(const pj of PROJECTS){ const s=st[pj.name];
    h+=`<div class="pcard ${projectFilter===pj.name?'active':''}" data-proj="${pj.name}"><div class="pcard-top"><span class="pcard-name">${pj.name}</span><span class="pcard-badge">2026</span></div>`
      +`<div class="pcard-label">참여 인원</div><div class="pcard-big">${s.cnt}<span class="unit">명</span></div>`

}
function scopeNames(){ return projectFilter ? NAMES.filter(n=> INDEX[n].some(e=>e.project===projectFilter)) : NAMES.slice(); }
function renderPills(){
  const scope=scopeNames();
  let over=0,full=0,room=0; scope.forEach(n=>{ const {mx}=peakOf(strip(INDEX[n])); if(mx>100.0001)over++; else if(mx>=99.999)full++; else room++; });
  const P=(k,label,cls,cnt)=>`<button class="pill ${statusFilter===k?'active':''}" data-status="${k}">${cls?`<i class="pd ${cls}"></i>`:''}${label}<span class="cnt">${cnt}</span></button>`;
  pillsEl.innerHTML = P("all","전체","",scope.length)+P("room","여유","green",room)+P("full","100% 도달","amber",full)+P("over","초과","red",over);
  pillsEl.querySelectorAll(".pill").forEach(b=> b.onclick=()=>{ statusFilter=b.dataset.status; selected=null; render(); });
}
function personList(){
  let names=scopeNames();
  const term=q.value.trim(); if(term) names=names.filter(n=>n.includes(term));
  let rows=names.map(n=>{ const {mx}=peakOf(strip(INDEX[n])); return {n,mx}; });
  if(statusFilter==="over") rows=rows.filter(r=>r.mx>100.0001);
  else if(statusFilter==="full") rows=rows.filter(r=>r.mx>=99.999&&r.mx<=100.0001);
  else if(statusFilter==="room") rows=rows.filter(r=>r.mx<99.999);
  rows.sort((a,b)=> b.mx-a.mx || a.n.localeCompare(b.n));
  return rows;
}

/* ===== 렌더 조각 ===== */
function summaryLine(mx,mi,rem){
  const cls = mx>100.0001?"over":(mx>=99.999?"full":"");
  return `<div class="yrhead"><span class="sum">최대 동시 참여 <span class="${cls}">${mx}%</span> <span style="color:var(--sub)">(${mi}월)</span></span>`
    + `<span class="rem">· 잔여(추가 가능) ${rem<0?`<span class="over">${rem}%</span>`:`<b>${rem}%</b>`}</span>`
    + (mx>100.0001?` <span class="over">· 100% 초과, 조정 필요</span>`:``) + `</div>`;
}
function stripHtml(m){
  let h=`<div class="strip">`;
  for(let i=1;i<=12;i++){ const v=r1(m[i]); const c=cellColor(v); h+=`<div class="cell" style="background:${c.bg};color:${c.fg}"><span class="m">${i}월</span><span class="v">${v}</span></div>`; }
  return h+`</div>`;
}
function cardView(name){
  const entries=INDEX[name];
  const anyLead=entries.some(e=>e.role==="과제책임자"||e.role==="실무책임자");
  const anyNew=entries.some(e=>e.isNew);
  const m=strip(entries); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  let html=`<div class="card"><h2>${name}`;
  if(anyLead) html+=` <span class="tag lead">책임급</span>`;
  if(anyNew) html+=` <span class="tag new">신규</span>`;
  html+=`<button class="editbtn" data-edit="${name}">수정</button></h2>`;
  html+=summaryLine(mx,mi,rem);
  html+=`<table class="pj">`;
  for(const e of entries.slice().sort((a,b)=>b.s[0][0]-a.s[0][0])){
    html+=`<tr><td>${e.project}<div class="rl">${e.role}${e.isNew?" · 신규":""}`+(e.note?` <span class="nt">· ${e.note}</span>`:``)+`</div></td><td class="p">${segText(e.s)}</td></tr>`;
  }
  html+=`</table>`+stripHtml(m)+`<div class="legend">칸 = 그 달의 전체 과제 합산 참여율 (초록 여유 · 노랑 100% 근접 · 빨강 초과)</div></div>`;
  return html;
}
function monOpts(sel){ let o=""; for(let i=1;i<=12;i++) o+=`<option value="${i}"${i===sel?" selected":""}>${i}</option>`; return o; }
function cardEdit(name){
  const entries=INDEX[name];
  const m=strip(entries); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  let html=`<div class="card"><h2>${name} <span class="tag lead">수정 중</span></h2>`;
  html+=`<div class="editnote">참여율(%)과 기간(월)을 바꾸면 아래 합계·월별이 바로 갱신돼요. “+ 기간 추가”로 구간을 나누고, ×로 지웁니다. 저장하면 모든 접속자에게 반영됩니다.</div>`;
  entries.forEach((e,ei)=>{
    html+=`<div class="ejrow"><div class="ejhead">${e.project} <span class="rl">${e.role}${e.isNew?" · 신규":""}</span>`+(e.note?` <span class="nt">· ${e.note}</span>`:``)+`</div>`;
    e.s.forEach((seg,si)=>{
      html+=`<div class="segrow"><input class="rateinp" type="number" min="0" max="100" step="0.1" value="${seg[0]}" data-ei="${ei}" data-si="${si}"><span class="segunit">%</span>`
        +`<select class="moninp" data-ei="${ei}" data-si="${si}" data-k="1">${monOpts(seg[1])}</select><span class="segunit">월 ~</span>`
        +`<select class="moninp" data-ei="${ei}" data-si="${si}" data-k="2">${monOpts(seg[2])}</select><span class="segunit">월</span>`
        +`<button class="segdel" data-ei="${ei}" data-si="${si}" title="이 구간 삭제">×</button></div>`;
    });
    html+=`<button class="segadd" data-ei="${ei}">+ 기간 추가</button></div>`;
  });
  html+=`<div id="editSummary">${summaryLine(mx,mi,rem)}${stripHtml(m)}</div>`;
  html+=`<div class="editactions"><button class="savebtn" data-save="${name}">저장</button><button class="cancelbtn" data-cancel="${name}">취소</button><span id="saveMsg" class="savemsg"></span></div></div>`;
  return html;
}
const BACKBAR = `<div class="backbar"><button class="backbtn" id="backHome">← 목록으로</button></div>`;
function renderList(){
  if(editing){ out.innerHTML=BACKBAR+cardEdit(editing); attachCardHandlers(); return; }
  if(selected){ out.innerHTML=BACKBAR+cardView(selected); attachCardHandlers(); return; }
  const rows=personList();
  listsub.textContent = `${projectFilter||"전체"} · ${rows.length}명`;

  for(const r of rows){

  const bh=document.getElementById("backHome"); if(bh) bh.onclick=backToList;
  out.querySelectorAll("[data-edit]").forEach(b=> b.onclick=()=>enterEdit(b.dataset.edit));
  out.querySelectorAll("[data-cancel]").forEach(b=> b.onclick=()=>cancelEdit(b.dataset.cancel));
  out.querySelectorAll("[data-save]").forEach(b=> b.onclick=()=>saveEdit(b.dataset.save));
  out.querySelectorAll(".rateinp").forEach(inp=> inp.oninput=()=>{
    let v=parseFloat(inp.value); if(isNaN(v)||v<0) v=0;
    INDEX[editing][+inp.dataset.ei].s[+inp.dataset.si][0]=v; refreshEditSummary(); });
  out.querySelectorAll(".moninp").forEach(sel=> sel.onchange=()=>{
    INDEX[editing][+sel.dataset.ei].s[+sel.dataset.si][+sel.dataset.k]=parseInt(sel.value,10); refreshEditSummary(); });
  out.querySelectorAll(".segdel").forEach(b=> b.onclick=()=>{
    const e=INDEX[editing][+b.dataset.ei]; if(e.s.length>1) e.s.splice(+b.dataset.si,1); else e.s[0][0]=0; renderList(); });
  out.querySelectorAll(".segadd").forEach(b=> b.onclick=()=>{
    const e=INDEX[editing][+b.dataset.ei], last=e.s[e.s.length-1]; e.s.push([0, last?Math.min(12,last[2]+1):1, 12]); renderList(); });
}
function refreshEditSummary(){
  const m=strip(INDEX[editing]); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  const el=document.getElementById("editSummary"); if(el) el.innerHTML=summaryLine(mx,mi,rem)+stripHtml(m);
}
function enterEdit(name){ editing=name; selected=name; editBackup=INDEX[name].map(e=>e.s.map(seg=>seg.slice())); renderList(); }
function cancelEdit(name){
  if(editBackup) INDEX[name].forEach((e,ei)=>{ e.s.length=0; editBackup[ei].forEach(seg=>e.s.push(seg.slice())); });
  editing=null; editBackup=null; renderList();
}
async function saveEdit(name){
  const msg=document.getElementById("saveMsg"); if(msg) msg.textContent="저장 중...";
  try{
    const rows=await sbLatest(1); const latestId=rows[0]?rows[0].id:null;

    const blob=await encryptProjects(PROJECTS, sessionPassword);
    const ins=await sbInsert(blob); loadedVersionId=ins.id;
    editing=null; editBackup=null; render(); toast("저장됐습니다. 모든 접속자에게 반영됩니다.");

async function reloadFromSb(){ const data=await loadData(sessionPassword); PROJECTS=data.projects; loadedVersionId=data.versionId; buildIndex(); render(); }

/* ===== 동기화 폴링 ===== */
function startPolling(){
  setInterval(async()=>{ if(editing) return;
    try{ const rows=await sbLatest(1); const latestId=rows[0]?rows[0].id:null;
      if(latestId&&latestId!==loadedVersionId){ await reloadFromSb(); toast("다른 사람의 수정이 반영됐어요."); } }catch(e){}
  }, 5000);
}
function toast(m){ let t=document.getElementById("toast"); if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.textContent=m; t.className="show"; clearTimeout(t._h); t._h=setTimeout(()=>{t.className="";},3600); }

/* ===== 내비게이션 ===== */
function toggleClear(){ const c=document.getElementById("qclear"); if(c) c.style.display=q.value?"":"none"; }
function restoreIfEditing(){ if(editing&&editBackup) INDEX[editing].forEach((e,ei)=>{ e.s.length=0; editBackup[ei].forEach(seg=>e.s.push(seg.slice())); }); editing=null; editBackup=null; }
function backToList(){ restoreIfEditing(); selected=null; render(); window.scrollTo(0,0); }
function goHome(){ restoreIfEditing(); selected=null; projectFilter=null; statusFilter="all"; q.value=""; render(); window.scrollTo(0,0); }

/* ===== 엑셀(.xlsx) — 과제별 시트, 라이브러리 없이 자체 생성 ===== */
function colName(n){ let s=""; while(n>0){ let r=(n-1)%26; s=String.fromCharCode(65+r)+s; n=Math.floor((n-1)/26); } return s; }
function xmlEsc(v){ return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function sheetXml(rows){
  let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach((row,ri)=>{ x+=`<row r="${ri+1}">`;
    row.forEach((cell,ci)=>{ if(cell===null||cell===undefined||cell==="")return; const ref=colName(ci+1)+(ri+1);
      if(typeof cell==="number") x+=`<c r="${ref}"><v>${cell}</v></c>`;
      else x+=`<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xmlEsc(cell)}</t></is></c>`; });
    x+="</row>"; });
  return x+"</sheetData></worksheet>";
}
let CRCTAB;
function crc32(bytes){ if(!CRCTAB){CRCTAB=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);CRCTAB[n]=c>>>0;}}
  let crc=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^CRCTAB[(crc^bytes[i])&0xFF];return (crc^0xFFFFFFFF)>>>0; }
function zipStore(files){
  const chunks=[],central=[];let offset=0;
  const u16=n=>[n&255,(n>>8)&255],u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const enc=new TextEncoder();
  for(const f of files){ const nb=enc.encode(f.name),crc=crc32(f.data),sz=f.data.length;
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nb.length),u16(0));
    chunks.push(new Uint8Array(lh),nb,f.data);
    const cd=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nb.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(new Uint8Array(cd),nb); offset+=30+nb.length+sz; }
  let cSize=0;central.forEach(c=>cSize+=c.length);const cOff=offset;
  const eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cSize),u32(cOff),u16(0)));
  const all=[...chunks,...central,eocd];let tot=0;all.forEach(a=>tot+=a.length);
  const o=new Uint8Array(tot);let p=0;for(const a of all){o.set(a,p);p+=a.length;}return o;
}
function buildXlsx(sheets){
  const enc=new TextEncoder(),used={};
  const names=sheets.map((s,i)=>{let nm=(s.name||("Sheet"+(i+1))).replace(/[\\\/\?\*\[\]:]/g,"_").slice(0,31)||("Sheet"+(i+1));let b=nm,k=1;while(used[nm]){nm=b.slice(0,28)+"_"+(++k);}used[nm]=1;return nm;});
  const files=[];
  let ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
  sheets.forEach((s,i)=>ct+=`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`);
  files.push({name:"[Content_Types].xml",data:enc.encode(ct+"</Types>")});
  files.push({name:"_rels/.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  let wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>';
  names.forEach((nm,i)=>wb+=`<sheet name="${xmlEsc(nm)}" sheetId="${i+1}" r:id="rId${i+1}"/>`);
  files.push({name:"xl/workbook.xml",data:enc.encode(wb+"</sheets></workbook>")});
  let wr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  sheets.forEach((s,i)=>wr+=`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`);
  files.push({name:"xl/_rels/workbook.xml.rels",data:enc.encode(wr+"</Relationships>")});
  sheets.forEach((s,i)=>files.push({name:`xl/worksheets/sheet${i+1}.xml`,data:enc.encode(sheetXml(s.rows))}));
  return zipStore(files);
}
function exportSheets(){
  const sheets=[];
  const ov=[["이름","최대 참여율(%)","잔여(추가가능,%)","참여 과제수","참여 과제"]];
  NAMES.map(n=>{const e=INDEX[n];const {mx}=peakOf(strip(e));return {n,mx,pjs:[...new Set(e.map(x=>x.project))]};})
    .sort((a,b)=>b.mx-a.mx||a.n.localeCompare(b.n))
    .forEach(r=>ov.push([r.n,r.mx,r1(100-r.mx),r.pjs.length,r.pjs.join(", ")]));
  sheets.push({name:"전체 요약",rows:ov});
  for(const pj of PROJECTS){
    const rows=[["구분","이름","신규여부","1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월","비고"]];
    for(const p of pj.people){
      const mm=Array(13).fill(0); for(const [pct,f,t] of p.s) for(let i=f;i<=t;i++) mm[i]+=pct;
      const row=[p.r||"참여연구원",p.n,p.isNew?"신규":"기존"];
      for(let i=1;i<=12;i++) row.push(mm[i]?r1(mm[i]):null);
      row.push(p.note||""); rows.push(row);
    }
    sheets.push({name:pj.name,rows});
  }
  return sheets;
}
function downloadXlsx(){
  if(!PROJECTS) return;
  try{
    const buf=buildXlsx(exportSheets());
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const d=new Date(), st=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    const a=document.createElement("a"); a.href=url; a.download=`참여율_${st}.xlsx`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },1000);
    toast("엑셀 파일을 내려받았어요 (과제별 시트).");
  }catch(e){ toast("엑셀 생성 실패: "+e.message); }
}

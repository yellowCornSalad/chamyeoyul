<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>참여율 검색</title>
<style>
  :root{
    --bg:#f7f8fa; --card:#fff; --line:#e5e7eb; --ink:#1f2430; --sub:#6b7280;
    --accent:#2563eb; --red:#dc2626; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Malgun Gothic",-apple-system,system-ui,sans-serif;
    font-size:14px;line-height:1.5}
  .wrap{max-width:960px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:19px;margin:0 0 2px}
  .note{color:var(--sub);font-size:12.5px;margin:0 0 16px}
  #gate{max-width:380px;margin:56px auto 0;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:24px}
  .gaterow{display:flex;gap:8px;margin-top:12px}
  #pw{flex:1;padding:11px 13px;font-size:15px;border:1.5px solid var(--line);border-radius:8px;outline:none;background:#fff}
  #pw:focus{border-color:var(--accent)}
  #go{padding:0 18px;font-size:14px;font-weight:600;color:#fff;background:var(--accent);
    border:none;border-radius:8px;cursor:pointer}
  .pwerr{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}
  .searchbar{position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:5}
  #q{width:100%;padding:13px 15px;font-size:16px;border:1.5px solid var(--line);
    border-radius:10px;outline:none;background:var(--card)}
  #q:focus{border-color:var(--accent)}
  .stat{display:flex;gap:14px;flex-wrap:wrap;margin:6px 2px 0;color:var(--sub);font-size:12.5px}
  .stat b{color:var(--ink)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px 16px 14px;margin:12px 0}
  .card h2{font-size:17px;margin:0 0 6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:#eef2ff;color:#4338ca}
  .tag.new{background:#ecfdf5;color:#047857}
  .tag.lead{background:#fef3c7;color:#92400e}
  .editbtn{margin-left:auto;font-size:12px;font-weight:600;color:var(--accent);background:#eef2ff;
    border:none;border-radius:7px;padding:5px 12px;cursor:pointer}
  .editbtn:hover{background:#e0e7ff}
  .card.editing{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
  .editnote{color:var(--sub);font-size:12px;margin:0 0 10px}
  .yrhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:6px 0 8px}
  .yrhead .sum{font-size:13px}
  .yrhead .rem{color:var(--sub);font-size:12.5px}
  .over{color:var(--red);font-weight:700}
  .full{color:var(--amber);font-weight:700}
  table.pj{width:100%;border-collapse:collapse;margin:2px 0 10px;font-size:13px}
  table.pj td{padding:6px 8px;border-bottom:1px solid #f0f1f3;vertical-align:middle}
  table.pj td.p{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:600}
  table.pj .rl{color:var(--sub);font-size:11.5px}
  table.pj .nt{color:var(--red);font-size:11.5px}
  .editseg{display:inline-flex;align-items:center;gap:3px;margin-left:10px}
  .editseg:first-child{margin-left:0}
  .rateinp{width:66px;padding:5px 7px;font-size:13px;border:1.5px solid var(--line);border-radius:7px;
    text-align:right;font-variant-numeric:tabular-nums}
  .rateinp:focus{outline:none;border-color:var(--accent)}
  .seglbl{color:var(--sub);font-size:11px}
  .editactions{display:flex;align-items:center;gap:8px;margin-top:6px}
  .savebtn{font-size:13px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:8px;padding:8px 18px;cursor:pointer}
  .cancelbtn{font-size:13px;color:var(--sub);background:#f3f4f6;border:none;border-radius:8px;padding:8px 14px;cursor:pointer}
  .savemsg{color:var(--sub);font-size:12px}
  .strip{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin:2px 0 4px}
  .cell{border-radius:6px;padding:5px 2px 4px;text-align:center;font-size:11px}
  .cell .m{color:var(--sub);font-size:9.5px;display:block;margin-bottom:1px}
  .cell .v{font-variant-numeric:tabular-nums;font-weight:600}
  .legend{color:var(--sub);font-size:11px;margin-top:2px}
  table.ov{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table.ov th,table.ov td{padding:9px 12px;text-align:left;border-bottom:1px solid #f0f1f3}
  table.ov th{background:#fafbfc;color:var(--sub);font-weight:600;font-size:12px}
  table.ov tr{cursor:pointer}
  table.ov tr:hover td{background:#f8faff}
  table.ov td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .bar{height:7px;border-radius:4px;background:#eef0f3;overflow:hidden;min-width:70px}
  .bar>span{display:block;height:100%;border-radius:4px}
  .pjnames{color:var(--sub);font-size:11.5px}
  .empty{color:var(--sub);padding:24px 4px}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:#111827;color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;
    opacity:0;pointer-events:none;transition:all .25s;z-index:50;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate">
    <h1>참여율 검색</h1>
    <p class="note">열람하려면 비밀번호를 입력하세요.</p>
    <div class="gaterow">
      <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus>
      <button id="go">확인</button>
    </div>
    <div id="pwerr" class="pwerr"></div>
  </div>

  <div id="app" style="display:none">
    <h1>참여율 검색</h1>
    <p class="note">이름을 검색하면 참여 중인 과제·참여율, 전체 합계와 잔여(추가 가능)율이 나와요.
      모든 수치는 2026년 기준, 11개 과제 동시진행으로 월별 합산해 최댓값을 봅니다(최대 100%).
      카드의 “수정”으로 참여율을 바꾸면 실시간으로 모든 접속자에게 반영됩니다.</p>
    <div class="searchbar">
      <input id="q" type="text" placeholder="이름 검색" autocomplete="off">
      <div class="stat" id="stat"></div>
    </div>
    <div id="out"></div>
  </div>
</div>

/* ===== 암호화 (WebCrypto) ===== */
function b64ToBytes(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
function bytesToB64(b){ let s=""; for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
async function deriveKey(password, salt){
  const bk = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:150000, hash:"SHA-256"},
    bk, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function decryptBlob(o, password){
  const key = await deriveKey(password, b64ToBytes(o.salt));
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(o.iv)}, key, b64ToBytes(o.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
async function encryptProjects(projects, password){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ct = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(projects))));
  return { salt:bytesToB64(salt), iv:bytesToB64(iv), data:bytesToB64(ct) };
}

/* ===== Supabase REST ===== */
async function sbLatest(n){
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=id,created_at,blob&order=created_at.desc&limit=${n||5}`, {headers:SB_H});
  if(!r.ok) throw new Error("sb "+r.status);
  return r.json();
}
async function sbInsert(blobObj){
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, {
    method:"POST", headers:{...SB_H, "Content-Type":"application/json", Prefer:"return=representation"},
    body: JSON.stringify({ blob: JSON.stringify(blobObj) })
  });
  if(!r.ok) throw new Error("sb insert "+r.status);
  return (await r.json())[0];
}

/* ===== 계산 ===== */
const r1 = x => Math.round(x*10)/10;
function strip(entries){
  const m = Array(13).fill(0);
  for(const e of entries) for(const [p,f,t] of e.s) for(let i=f;i<=t;i++) m[i]+=p;
  return m;
}
function peakOf(m){ let mx=0,mi=1; for(let i=1;i<=12;i++) if(m[i]>mx+1e-9){mx=m[i];mi=i;} return {mx:r1(mx),mi}; }
function segText(s){ return s.map(([p,f,t])=> f===1&&t===12 ? p+"%" : `${p}%(${f}~${t}월)`).join(" → "); }
function cellColor(v){
  if(v>100.0001) return {bg:"#fee2e2",fg:"#b91c1c"};
  if(v>=99.999)  return {bg:"#fde68a",fg:"#92400e"};
  if(v>=80)      return {bg:"#fef3c7",fg:"#92400e"};
  if(v>0)        return {bg:"#dcfce7",fg:"#166534"};
  return {bg:"#f3f4f6",fg:"#9ca3af"};
}
function buildIndex(){
  INDEX={};
  for(const pj of PROJECTS) for(const p of pj.people)
    (INDEX[p.n] ||= []).push({project:pj.name, role:p.r||"참여연구원", isNew:!!p.isNew, note:p.note||"", s:p.s});
  NAMES = Object.keys(INDEX);
}

function summaryLine(mx,mi,rem){
  const cls = mx>100.0001?"over":(mx>=99.999?"full":"");
  return `<div class="yrhead"><span class="sum">최대 동시 참여 <span class="${cls}">${mx}%</span> <span style="color:var(--sub)">(${mi}월)</span></span>`
    + `<span class="rem">· 잔여(추가 가능) ${rem<0?`<span class="over">${rem}%</span>`:`<b>${rem}%</b>`}</span>`
    + (mx>100.0001?` <span class="over">· 100% 초과, 조정 필요</span>`:``) + `</div>`;
}
function stripHtml(m){
  let h = `<div class="strip">`;
  for(let i=1;i<=12;i++){ const v=r1(m[i]); const c=cellColor(v);
    h += `<div class="cell" style="background:${c.bg};color:${c.fg}"><span class="m">${i}월</span><span class="v">${v}</span></div>`; }
  return h + `</div>`;
}

function renderStat(){
  let over=0, full=0;
  for(const n of NAMES){ const {mx}=peakOf(strip(INDEX[n])); if(mx>100.0001) over++; else if(mx>=99.999) full++; }
  statEl.innerHTML = `총 <b>${NAMES.length}명</b> · 과제 <b>${PROJECTS.length}개</b>`
    + ` · 100% 초과 <b class="over">${over}명</b> · 100% 도달 <b class="full">${full}명</b>`;
}

function cardView(name){
  const entries = INDEX[name];
  const anyLead = entries.some(e=>e.role==="과제책임자"||e.role==="실무책임자");
  const anyNew  = entries.some(e=>e.isNew);
  const m = strip(entries); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  let html = `<div class="card"><h2>${name}`;
  if(anyLead) html += ` <span class="tag lead">책임급</span>`;
  if(anyNew)  html += ` <span class="tag new">신규</span>`;
  html += `<button class="editbtn" data-edit="${name}">수정</button></h2>`;
  html += summaryLine(mx,mi,rem);
  html += `<table class="pj">`;
  for(const e of entries.slice().sort((a,b)=>b.s[0][0]-a.s[0][0])){
    html += `<tr><td>${e.project}<div class="rl">${e.role}${e.isNew?" · 신규":""}`
      + (e.note?` <span class="nt">· ${e.note}</span>`:``)
      + `</div></td><td class="p">${segText(e.s)}</td></tr>`;
  }
  html += `</table>` + stripHtml(m)
    + `<div class="legend">칸 = 그 달의 전체 과제 합산 참여율 (초록 여유 · 노랑 100% 근접 · 빨강 초과)</div></div>`;
  return html;
}

function cardEdit(name){
  const entries = INDEX[name];
  const m = strip(entries); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  let html = `<div class="card editing"><h2>${name} <span class="tag lead">수정 중</span></h2>`;
  html += `<div class="editnote">참여율(%)을 바꾸면 아래 합계·월별이 바로 갱신돼요. 저장하면 모든 접속자에게 반영됩니다.</div>`;
  html += `<table class="pj">`;
  entries.forEach((e,ei)=>{
    html += `<tr><td>${e.project}<div class="rl">${e.role}${e.isNew?" · 신규":""}`
      + (e.note?` <span class="nt">· ${e.note}</span>`:``) + `</div></td><td class="p">`;
    e.s.forEach((seg,si)=>{
      const lbl = (seg[1]===1&&seg[2]===12) ? "" : ` <span class="seglbl">${seg[1]}~${seg[2]}월</span>`;
      html += `<span class="editseg"><input class="rateinp" type="number" min="0" max="100" step="0.1" value="${seg[0]}" data-ei="${ei}" data-si="${si}">%${lbl}</span>`;
    });
    html += `</td></tr>`;
  });
  html += `</table>`;
  html += `<div id="editSummary">${summaryLine(mx,mi,rem)}${stripHtml(m)}</div>`;
  html += `<div class="editactions"><button class="savebtn" data-save="${name}">저장</button>`
    + `<button class="cancelbtn" data-cancel="${name}">취소</button><span id="saveMsg" class="savemsg"></span></div></div>`;
  return html;
}

function personCard(name){ return editing===name ? cardEdit(name) : cardView(name); }

function renderOverview(){
  const rows = NAMES.map(n=>{ const e=INDEX[n]; const {mx:pk}=peakOf(strip(e));
    return {n,pk,pjs:[...new Set(e.map(x=>x.project))]}; })
    .sort((a,b)=> b.pk-a.pk || a.n.localeCompare(b.n));
  let html = `<table class="ov"><thead><tr><th>이름</th><th>참여 과제</th>`
    + `<th style="text-align:right">최대</th><th style="width:120px">부하</th><th style="text-align:right">잔여</th></tr></thead><tbody>`;
  for(const r of rows){
    const cls = r.pk>100.0001?"over":(r.pk>=99.999?"full":"");
    const barw = Math.min(100,r.pk);
    const barc = r.pk>100.0001?"#dc2626":(r.pk>=99.999?"#f59e0b":"#22c55e");
    const rem = r1(100-r.pk);
    html += `<tr data-n="${r.n}"><td><b>${r.n}</b></td>`
      + `<td><span class="pjnames">${r.pjs.join(", ")}</span></td>`
      + `<td class="num ${cls}">${r.pk}%</td>`
      + `<td><div class="bar"><span style="width:${barw}%;background:${barc}"></span></div></td>`
      + `<td class="num">${rem<0?`<span class="over">${rem}%</span>`:rem+"%"}</td></tr>`;
  }
  out.innerHTML = html + `</tbody></table>`;
  out.querySelectorAll("tr[data-n]").forEach(tr=>{ tr.onclick=()=>{ q.value=tr.dataset.n; render(); q.scrollIntoView({block:"start"}); }; });
}

function render(){
  if(!PROJECTS) return;
  const term = q.value.trim();
  if(!term){ if(!editing) renderOverview(); return; }
  const hits = NAMES.filter(n=>n.includes(term)).sort((a,b)=> peakOf(strip(INDEX[b])).mx - peakOf(strip(INDEX[a])).mx);
  if(!hits.length){ out.innerHTML = `<div class="empty">"${term}" 참여 기록 없음.</div>`; return; }
  out.innerHTML = hits.map(personCard).join("");
  attachCardHandlers();
}

function attachCardHandlers(){
  out.querySelectorAll("[data-edit]").forEach(b=> b.onclick=()=>enterEdit(b.dataset.edit));
  out.querySelectorAll("[data-cancel]").forEach(b=> b.onclick=()=>cancelEdit(b.dataset.cancel));
  out.querySelectorAll("[data-save]").forEach(b=> b.onclick=()=>saveEdit(b.dataset.save));
  out.querySelectorAll(".rateinp").forEach(inp=> inp.oninput=()=>{
    let v = parseFloat(inp.value); if(isNaN(v)||v<0) v=0;
    INDEX[editing][+inp.dataset.ei].s[+inp.dataset.si][0] = v;
    refreshEditSummary();
  });
}
function refreshEditSummary(){
  const m = strip(INDEX[editing]); const {mx,mi}=peakOf(m); const rem=r1(100-mx);
  const el = document.getElementById("editSummary"); if(el) el.innerHTML = summaryLine(mx,mi,rem)+stripHtml(m);
}

/* ===== 수정 ===== */
function enterEdit(name){
  editing = name;
  editBackup = INDEX[name].map(e=>e.s.map(seg=>seg[0]));   // % 백업
  render();
}
function cancelEdit(name){
  if(editBackup) INDEX[name].forEach((e,ei)=> e.s.forEach((seg,si)=> seg[0]=editBackup[ei][si]));
  editing=null; editBackup=null; render();
}
async function saveEdit(name){
  const msg = document.getElementById("saveMsg"); if(msg) msg.textContent="저장 중...";
  try{
    const rows = await sbLatest(1);
    const latestId = rows[0] ? rows[0].id : null;
    if(latestId !== loadedVersionId){
      editing=null; editBackup=null;
      await reloadFromSb();
      toast("다른 사람이 먼저 수정했어요. 최신 내용을 불러왔습니다 — 다시 시도해 주세요.");
      return;
    }
    const blob = await encryptProjects(PROJECTS, sessionPassword);
    const ins = await sbInsert(blob);
    loadedVersionId = ins.id;
    editing=null; editBackup=null;
    render(); renderStat();
    toast("저장됐습니다. 모든 접속자에게 반영됩니다.");
  }catch(e){
    if(msg) msg.textContent = "저장 실패: "+e.message+" (다시 시도)";
  }
}
async function reloadFromSb(){
  const data = await loadData(sessionPassword);
  PROJECTS = data.projects; loadedVersionId = data.versionId; buildIndex();
  render(); renderStat();
}

/* ===== 동기화 폴링 ===== */
function startPolling(){
  setInterval(async()=>{
    if(editing) return;
    try{
      const rows = await sbLatest(1);
      const latestId = rows[0] ? rows[0].id : null;
      if(latestId && latestId !== loadedVersionId){ await reloadFromSb(); toast("다른 사람의 수정이 반영됐어요."); }
    }catch(e){}
  }, 5000);
}

/* ===== 토스트 ===== */
function toast(m){
  let t = document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=m; t.className="show";
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.className=""; }, 3600);
}

/* ===== 게이트 ===== */
async function unlock(password){
  const data = await loadData(password);       // 비번 틀리면 throw
  sessionPassword = password;
  PROJECTS = data.projects; loadedVersionId = data.versionId; buildIndex();
  document.getElementById("gate").style.display="none";
  document.getElementById("app").style.display="";
  renderStat(); renderOverview(); startPolling(); q.focus();
}
function submitPw(){
  const err = document.getElementById("pwerr"); err.textContent="확인 중...";
  unlock(document.getElementById("pw").value).then(()=>{ err.textContent=""; })
    .catch(()=>{ err.textContent="비밀번호가 올바르지 않습니다."; });
}
document.getElementById("go").addEventListener("click", submitPw);
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") submitPw(); });
q.addEventListener("input", render);
document.getElementById("pw").focus();
</script>
